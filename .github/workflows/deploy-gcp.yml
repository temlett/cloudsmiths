name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: "${{ vars.GCP_PROJECT_ID }}"
  GCP_REGION: "${{ vars.GCP_REGION || 'europe-west1' }}"
  GAR_LOCATION: "${{ vars.GAR_LOCATION || vars.GCP_REGION || 'europe-west1' }}"
  GAR_REPOSITORY: "${{ vars.GAR_REPOSITORY || 'cloudsmiths' }}"
  BACKEND_SERVICE_NAME: "${{ vars.BACKEND_SERVICE_NAME || 'cloudsmiths-backend' }}"
  FRONTEND_SERVICE_NAME: "${{ vars.FRONTEND_SERVICE_NAME || 'cloudsmiths-frontend' }}"

jobs:
  quality-gates:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint workspace
        run: npm run lint

      - name: Run test suite
        run: npm run test

      - name: Build workspace
        run: npm run build

  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}"

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/backend/Dockerfile -t "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/backend:$IMAGE_TAG" .
          docker push "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/backend:$IMAGE_TAG"

      - name: Deploy backend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud run deploy "$BACKEND_SERVICE_NAME" \
            --image "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/backend:$IMAGE_TAG" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "FAVORITES_STORAGE=postgres,DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }},DATABASE_SSL=true"

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_API_URL: "${{ vars.FRONTEND_BACKEND_API_URL }}"
          AUTH_BASE_URL: "${{ vars.FRONTEND_AUTH_BASE_URL || 'https://dummyjson.com/auth' }}"
        run: |
          docker build \
            -f apps/frontend/Dockerfile \
            --build-arg BACKEND_API_URL="$BACKEND_API_URL" \
            --build-arg AUTH_BASE_URL="$AUTH_BASE_URL" \
            -t "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/frontend:$IMAGE_TAG" .
          docker push "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/frontend:$IMAGE_TAG"

      - name: Deploy frontend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud run deploy "$FRONTEND_SERVICE_NAME" \
            --image "$GAR_LOCATION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/frontend:$IMAGE_TAG" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated
